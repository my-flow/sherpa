# Configuration for the sherpa mail-digest script.
#
# Place this file at one of the following locations:
#   1. ~/.sherpa/sherpa.conf
#   2. $XDG_CONFIG_HOME/sherpa/sherpa.conf

# Timeout in seconds for individual himalaya commands (folder list,
# envelope list). Applies per invocation, not cumulatively.
# Increase on slow IMAP connections; decrease to fail-fast.
SHERPA_HIMALAYA_TIMEOUT = 30

# Timeout in seconds for fetching a single message thread
# (himalaya message thread --preview). Threads can be large, so this
# is intentionally higher than the general timeout.
SHERPA_HIMALAYA_THREAD_TIMEOUT = 60

# Number of parallel jobs used when fetching folder envelopes and
# message threads. Higher values speed up large mailboxes but increase
# concurrent IMAP connections. Set to 1 for sequential execution.
SHERPA_PARALLEL_FETCHES = 4

# Maximum number of characters kept from each thread preview.
# Threads longer than this are truncated).
# Useful for keeping the final JSON payload manageable.
SHERPA_THREAD_MAX_LENGTH = 5000

# Number of envelopes fetched per page when listing unseen mails in a
# folder. The script paginates automatically until a page returns fewer
# than this many results. Larger values mean fewer round-trips but
# higher per-request memory usage.
SHERPA_ENVELOPE_PAGE_SIZE = 200
